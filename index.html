<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pankaj Bhardwaj</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:450px;
    background:#fff;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.profile-img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #f0f0f0;
}

h1{
    margin-top:15px;
    font-size:38px;
    font-weight:bold;
    color:#222;
}

.subscribers{
    color:#666;
    margin-top:10px;
    font-size:20px;
}

.info{
    margin-top:15px;
    color:#333;
    font-size:18px;
}

.button-container{
    display:flex;
    gap:15px;
    margin:25px 0;
    flex-wrap:wrap;
    justify-content:center;
}

.telegram-btn{
    flex:1;
    min-width:calc(50% - 8px);
    background:#1997e6;
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    padding:16px 12px;
    border-radius:15px;
    transition:.3s;
    display:flex;
    align-items:center;
    justify-content:center;
}

.telegram-btn:hover{
    background:#0d86d5;
}

@media(max-width:480px){
    .telegram-btn{
        min-width:100%;
        flex:1 1 100%;
        font-size:16px;
        padding:14px 10px;
    }
    
    .button-container{
        flex-direction:column;
        gap:10px;
    }
}

.features{
    margin:20px 0;
}

.features p{
    font-size:22px;
    margin:10px 0;
    color:#333;
}

.tags{
    margin-top:15px;
}

.tag{
    display:inline-block;
    padding:10px 18px;
    border-radius:30px;
    margin:5px;
    color:#fff;
    font-weight:bold;
}

.red{background:#f44336;}
.blue{background:#2196f3;}
.dark{background:#1f2937;}
.green{background:#22c55e;}

.learn{
    margin:25px 0;
    color:#16a34a;
    font-size:28px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

    <img class="profile-img"
    src="https://i.ibb.co/C32Scsy9/images-2.jpg"
    alt="Pankaj Bhardwaj">

    <h1>Pankaj Bhardwaj ✅</h1>

    <div class="subscribers">78,127 Subscribers</div>

    <div class="info">📊 Exclusive Insights & Daily Tips</div>

    <!-- BUTTONS SIDE BY SIDE -->
    <div class="button-container">
        <a class="telegram-btn"
           href="https://t.me/+9ULGOOHKzA0wMmNl"
           target="_blank">
           ✈ JOIN CHANNEL
        </a>
    </div>

    <div class="features">
        <p>🔥 INTRADAY | OPTIONS | SWING ANALYSIS</p>
        <p>📈 High Accuracy Signals | Real-Time Updates</p>
    </div>

    <div class="tags">
        <span class="tag red">NIFTY 50</span>
        <span class="tag red">BANKNIFTY</span>
        <span class="tag dark">INTRADAY</span>
        <span class="tag dark">OPTIONS</span>
        <span class="tag green">SWING TRADE</span>
    </div>

    <div class="learn">
        ✅ Learn, Analyse & Grow
    </div>

</div>

</body>
</html>
