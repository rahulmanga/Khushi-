  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:420px;
      background:linear-gradient(180deg,#1b1b1b,#111);
      border-radius:25px;
      padding:30px 20px;
      text-align:center;
      box-shadow:0 0 20px rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
    }

    .profile img{
      width:150px;
      height:150px;
      border-radius:50%;
      border:5px solid #ffd700;
      object-fit:cover;
      margin-bottom:20px;
    }

    h1{
      color:#ffd700;
      font-size:42px;
      margin-bottom:15px;
      font-weight:800;
    }

    .subtitle{
      font-size:20px;
      color:#ddd;
      margin-bottom:30px;
      line-height:1.5;
    }

    .badge{
      background:#2b2b2b;
      padding:18px;
      border-radius:18px;
      margin-bottom:18px;
      font-size:28px;
      font-weight:bold;
    }

    .telegram-btn{
      display:block;
      width:100%;
      background:linear-gradient(90deg,#007bff,#00c6ff);
      color:white;
      text-decoration:none;
      padding:22px;
      border-radius:50px;
      font-size:30px;
      font-weight:bold;
      margin:30px 0;
      transition:0.3s;
    }

    .telegram-btn:hover{
      transform:scale(1.03);
    }

    .feature{
      background:#1e1e1e;
      border:1px solid rgba(255,255,255,0.08);
      padding:20px;
      border-radius:18px;
      margin-bottom:18px;
      font-size:24px;
      text-align:left;
    }

    .feature span{
      color:#00ff88;
      margin-right:10px;
      font-weight:bold;
    }

    @media(max-width:480px){
      h1{
        font-size:34px;
      }

      .telegram-btn{
        font-size:24px;
        padding:18px;
      }

      .feature{
        font-size:20px;
      }
    }

  </style>

  <div class="container">
